<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival Guides</title>
    
    <!-- Tailwind CSS for M3 Expressive Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Material Symbols (Rounded) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <style>
        /* Material 3 Expressive Typography */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F0F2F5;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            overflow: hidden; /* App container handles scrolling */
        }

        .reading-text {
            font-family: 'Lora', serif; /* Serif font for long-form immersive reading */
        }

        /* Smooth bouncy transitions for M3 expressive feel */
        .m3-card {
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s ease;
        }
        .m3-card:active {
            transform: scale(0.96);
        }

        /* Screen Transitions */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #F4F5F9;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .screen-right {
            transform: translateX(100%);
        }

        .screen-active {
            transform: translateX(0);
        }
        
        .screen-left {
            transform: translateX(-30%); /* Parallax effect for back screen */
        }

        /* Bottom Sheet Transition */
        #ai-sheet-container {
            transition: opacity 0.3s ease;
        }
        #ai-sheet {
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .sheet-hidden {
            transform: translateY(100%);
        }

        /* Custom Scrollbar for reading */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

        /* FAB Animation */
        @keyframes fabPop {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .fab-enter { animation: fabPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        /* AI Loading dots */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex justify-center">

    <!-- Mobile App Container -->
    <main class="w-full max-w-md bg-black h-screen shadow-2xl relative overflow-hidden">
        
        <!-- ========================================== -->
        <!-- SCREEN 1: LIST VIEW -->
        <!-- ========================================== -->
        <div id="list-screen" class="screen screen-active z-10 pb-20">
            <!-- Header -->
            <header class="px-6 pt-10 pb-4 sticky top-0 bg-[#F4F5F9]/90 backdrop-blur-md z-20 flex items-center gap-4">
                <a href="index.html" class="h-10 w-10 rounded-full bg-white flex items-center justify-center border border-gray-200 shadow-sm m3-card text-decoration-none">
                    <span class="material-symbols-rounded text-gray-700">arrow_back</span>
                </a>
                <div>
                    <h1 class="text-2xl font-black text-gray-900 tracking-tight leading-none mt-1">Survival Guides</h1>
                </div>
            </header>

            <div class="px-6 pt-2 pb-8 flex flex-col gap-6" id="guides-container">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- ========================================== -->
        <!-- SCREEN 2: IMMERSIVE READING VIEW -->
        <!-- ========================================== -->
        <div id="reader-screen" class="screen screen-right z-20 bg-white">
            
            <!-- Edge-to-Edge Header Image -->
            <div class="relative w-full h-[40vh]">
                <img id="reader-cover" src="" class="absolute inset-0 w-full h-full object-cover">
                <!-- Gradient overlays for legibility -->
                <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>
                
                <!-- Back Button -->
                <button onclick="closeGuide()" class="absolute top-10 left-4 h-10 w-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white m3-card border border-white/20 z-10">
                    <span class="material-symbols-rounded">close</span>
                </button>

                <!-- Title Overlay -->
                <div class="absolute bottom-6 left-6 right-6">
                    <div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-blue-600 text-white text-[10px] font-bold uppercase tracking-widest mb-3">
                        <span class="material-symbols-rounded text-[14px]" id="reader-icon">auto_stories</span>
                        <span id="reader-category">Category</span>
                    </div>
                    <h1 id="reader-title" class="text-3xl font-black text-white leading-tight shadow-sm">Guide Title</h1>
                    <p class="text-gray-300 text-sm mt-2 flex items-center gap-1.5 font-medium">
                        <span class="material-symbols-rounded text-[16px]">schedule</span> <span id="reader-time">5 min read</span>
                    </p>
                </div>
            </div>

            <!-- Content Area -->
            <article class="px-6 py-8 pb-32 reading-text text-gray-800 text-lg leading-relaxed space-y-6" id="reader-content">
                <!-- Content goes here -->
            </article>

            <!-- Floating AI Button -->
            <button id="fab-ai" onclick="openAiChat()" class="fixed bottom-6 right-6 bg-gradient-to-br from-indigo-600 to-purple-700 text-white rounded-full pl-4 pr-5 py-3.5 flex items-center gap-2 shadow-[0_8px_24px_rgba(79,70,229,0.4)] m3-card z-30 opacity-0 pointer-events-none group">
                <div class="bg-white/20 rounded-full p-1 group-hover:scale-110 transition-transform">
                    <span class="material-symbols-rounded text-[20px]">smart_toy</span>
                </div>
                <span class="font-bold tracking-wide">Ask AI</span>
            </button>
        </div>

        <!-- ========================================== -->
        <!-- AI CHAT BOTTOM SHEET OVERLAY -->
        <!-- ========================================== -->
        <div id="ai-sheet-container" class="absolute inset-0 z-50 bg-gray-900/40 backdrop-blur-sm opacity-0 pointer-events-none flex flex-col justify-end">
            
            <div id="ai-sheet" class="bg-white w-full h-[75vh] rounded-t-[32px] shadow-[0_-12px_40px_rgba(0,0,0,0.2)] flex flex-col sheet-hidden relative">
                
                <!-- Close / Drag handle -->
                <div class="absolute top-0 w-full pt-4 pb-2 px-6 flex flex-col items-center cursor-pointer bg-white rounded-t-[32px] z-10" onclick="closeAiChat()">
                    <div class="w-12 h-1.5 bg-gray-200 rounded-full mb-4"></div>
                    <div class="w-full flex items-center gap-3">
                        <div class="h-10 w-10 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center">
                            <span class="material-symbols-rounded">smart_toy</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900 text-lg leading-tight" id="ai-chat-title">Guide Assistant</h3>
                            <p class="text-xs font-medium text-indigo-600" id="ai-chat-context">Context: Evacuation Protocol</p>
                        </div>
                    </div>
                </div>

                <!-- Chat Area -->
                <div class="flex-1 overflow-y-auto px-6 pt-24 pb-4 space-y-4" id="chat-messages">
                    <!-- Initial AI Greeting -->
                    <div class="flex gap-3 max-w-[85%]">
                        <div class="h-8 w-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center">
                            <span class="material-symbols-rounded text-indigo-600 text-[16px]">smart_toy</span>
                        </div>
                        <div class="bg-indigo-50 text-indigo-900 px-4 py-3 rounded-2xl rounded-tl-sm text-sm font-medium leading-relaxed shadow-sm">
                            I'm your AI survival assistant. Need specific details about this guide or a substitute for an item you don't have? Ask away.
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="p-4 bg-white border-t border-gray-100">
                    <div class="bg-gray-100 rounded-full flex items-center px-4 py-2 focus-within:ring-2 focus-within:ring-indigo-100 focus-within:bg-white border border-transparent focus-within:border-indigo-300 transition-all">
                        <input type="text" id="ai-input" placeholder="E.g., I don't have sterile gauze..." class="bg-transparent border-none outline-none w-full text-sm text-gray-800 placeholder-gray-500 py-2">
                        <button onclick="sendChatMessage()" class="text-indigo-600 hover:text-indigo-800 h-8 w-8 flex items-center justify-center transition-colors m3-card shrink-0">
                            <span class="material-symbols-rounded text-[24px]">send</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- 1. Content Data ---
        const guidesData = [
            {
                id: 'first-aid',
                title: "Trauma & First Aid",
                category: "Medical",
                icon: "medical_services",
                time: "8 min read",
                cover: "https://images.unsplash.com/photo-1603398938378-e54eab446dde?q=80&w=800&auto=format&fit=crop",
                content: `
                    <h2 class="text-2xl font-black text-gray-900 font-sans">Stop the Bleed</h2>
                    <p>The immediate priority in any trauma situation is hemorrhage control. Identify the source of bleeding. If it's spurting or pulsing, it is likely arterial.</p>
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-xl my-6">
                        <h4 class="font-bold text-red-800 font-sans flex items-center gap-2 mb-1"><span class="material-symbols-rounded text-[18px]">warning</span> Critical Rule</h4>
                        <p class="text-red-700 text-sm italic">Never remove an impaled object. Pack gauze around it to stabilize, and seek immediate medical evacuation.</p>
                    </div>
                    <p>Apply firm, direct pressure using sterile gauze. If blood soaks through, do not remove the first layer of gauze; simply add more on top and press harder.</p>
                    <h2 class="text-2xl font-black text-gray-900 font-sans mt-8">Applying a Tourniquet</h2>
                    <p>For life-threatening bleeding on limbs that direct pressure cannot control, a tourniquet is required. Place it 2-3 inches above the wound (closer to the torso), but never directly over a joint.</p>
                    <p>Tighten the windlass until bleeding completely stops. Document the exact time the tourniquet was applied—this is critical for surgeons later.</p>
                `
            },
            {
                id: 'evacuation',
                title: "Evacuation Protocol",
                category: "Logistics",
                icon: "directions_run",
                time: "5 min read",
                cover: "https://images.unsplash.com/photo-1456428199391-a3b1cb5e93ab?q=80&w=800&auto=format&fit=crop",
                content: `
                    <p>When an evacuation order is issued, hesitation can be fatal. Execute your pre-planned departure timeline immediately.</p>
                    <h2 class="text-2xl font-black text-gray-900 font-sans mt-6">The 10-Minute Rule</h2>
                    <p>You should be able to leave your home within 10 minutes of an alert. This requires pre-packing your Emergency Kit and keeping it by the primary exit door.</p>
                    <ul class="list-disc pl-5 space-y-2 mt-4 text-gray-700">
                        <li>Wear sturdy shoes (no sandals) and long pants.</li>
                        <li>Shut off main gas valves and electricity breakers before leaving if instructed by authorities.</li>
                        <li>Grab physical maps—cellular networks often collapse during mass evacuations due to congestion.</li>
                    </ul>
                    <h2 class="text-2xl font-black text-gray-900 font-sans mt-8">Route Selection</h2>
                    <p>Always have a primary route and at least two alternatives. Avoid bridges or low-lying tunnels if fleeing floods or earthquakes.</p>
                `
            },
            {
                id: 'flood',
                title: "Urban Flood Safety",
                category: "Environment",
                icon: "water_damage",
                time: "6 min read",
                cover: "https://images.unsplash.com/photo-1547683905-f686c993b45e?q=80&w=800&auto=format&fit=crop",
                content: `
                    <p>Urban floods rise rapidly and are heavily contaminated with sewage, chemicals, and debris. Six inches of fast-moving water can knock over an adult.</p>
                    <h2 class="text-2xl font-black text-gray-900 font-sans mt-6">Vehicle Hazards</h2>
                    <p>Never attempt to drive through flooded roads. It takes only 12 inches of rushing water to carry away a small car, and 24 inches for most SUVs.</p>
                    <div class="bg-blue-50 border border-blue-100 p-5 rounded-2xl my-6 flex gap-4">
                        <span class="material-symbols-rounded text-blue-600 mt-1">directions_car</span>
                        <p class="text-sm text-blue-900">If your vehicle stalls in rapidly rising water, abandon it immediately and seek higher ground. Your vehicle is replaceable; your life is not.</p>
                    </div>
                    <h2 class="text-2xl font-black text-gray-900 font-sans mt-8">Electrical Danger</h2>
                    <p>Assume all standing water is electrically charged. Stay far away from downed power lines and submerged electrical boxes.</p>
                `
            }
        ];

        let currentGuide = null;

        // --- 2. Render List View ---
        const container = document.getElementById('guides-container');
        
        guidesData.forEach(guide => {
            const card = document.createElement('button');
            card.className = "m3-card relative w-full h-56 rounded-[32px] overflow-hidden text-left focus:outline-none group shadow-[0_8px_24px_rgba(0,0,0,0.06)]";
            card.onclick = () => openGuide(guide.id);
            
            card.innerHTML = `
                <img src="${guide.cover}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent"></div>
                <div class="absolute inset-0 p-6 flex flex-col justify-end">
                    <div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-white/20 backdrop-blur-md text-white text-[10px] font-bold uppercase tracking-widest w-max mb-3">
                        <span class="material-symbols-rounded text-[14px]">${guide.icon}</span>
                        ${guide.category}
                    </div>
                    <h2 class="text-2xl font-black text-white leading-tight">${guide.title}</h2>
                </div>
            `;
            container.appendChild(card);
        });

        // --- 3. View Transitions ---
        const listScreen = document.getElementById('list-screen');
        const readerScreen = document.getElementById('reader-screen');
        const fab = document.getElementById('fab-ai');

        function openGuide(id) {
            currentGuide = guidesData.find(g => g.id === id);
            
            // Populate content
            document.getElementById('reader-cover').src = currentGuide.cover;
            document.getElementById('reader-title').textContent = currentGuide.title;
            document.getElementById('reader-category').textContent = currentGuide.category;
            document.getElementById('reader-icon').textContent = currentGuide.icon;
            document.getElementById('reader-time').textContent = currentGuide.time;
            document.getElementById('reader-content').innerHTML = currentGuide.content;
            
            // Update AI Context
            document.getElementById('ai-chat-context').textContent = `Context: ${currentGuide.title}`;

            // Reset scroll
            readerScreen.scrollTop = 0;

            // Transition
            listScreen.classList.remove('screen-active');
            listScreen.classList.add('screen-left');
            
            readerScreen.classList.remove('screen-right');
            readerScreen.classList.add('screen-active');

            // Show FAB with delay
            setTimeout(() => {
                fab.classList.remove('opacity-0', 'pointer-events-none');
                fab.classList.add('fab-enter', 'pointer-events-auto');
            }, 500);
        }

        function closeGuide() {
            // Hide FAB
            fab.classList.add('opacity-0', 'pointer-events-none');
            fab.classList.remove('fab-enter', 'pointer-events-auto');

            // Transition
            readerScreen.classList.remove('screen-active');
            readerScreen.classList.add('screen-right');
            
            listScreen.classList.remove('screen-left');
            listScreen.classList.add('screen-active');
            
            currentGuide = null;
        }

        // --- 4. AI Chat Interactivity ---
        const sheetContainer = document.getElementById('ai-sheet-container');
        const sheet = document.getElementById('ai-sheet');
        const chatMessages = document.getElementById('chat-messages');
        const aiInput = document.getElementById('ai-input');

        function openAiChat() {
            sheetContainer.classList.remove('opacity-0', 'pointer-events-none');
            sheet.classList.remove('sheet-hidden');
        }

        function closeAiChat() {
            sheet.classList.add('sheet-hidden');
            setTimeout(() => {
                sheetContainer.classList.add('opacity-0', 'pointer-events-none');
            }, 300); // Wait for transform transition
        }

        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-3 max-w-[85%] ${isUser ? 'ml-auto flex-row-reverse' : ''}`;
            
            const avatar = isUser ? 
                `<div class="h-8 w-8 bg-gray-900 rounded-full flex-shrink-0 flex items-center justify-center"><span class="material-symbols-rounded text-white text-[16px]">person</span></div>` : 
                `<div class="h-8 w-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center"><span class="material-symbols-rounded text-indigo-600 text-[16px]">smart_toy</span></div>`;
            
            const bubbleStyle = isUser ? 
                `bg-gray-900 text-white rounded-tr-sm` : 
                `bg-indigo-50 text-indigo-900 rounded-tl-sm`;

            msgDiv.innerHTML = `
                ${avatar}
                <div class="${bubbleStyle} px-4 py-3 rounded-2xl text-sm font-medium leading-relaxed shadow-sm">
                    ${text}
                </div>
            `;
            
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendChatMessage() {
            const text = aiInput.value.trim();
            if(!text) return;

            // User Message
            appendMessage(text, true);
            aiInput.value = '';

            // AI Loading State
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = `flex gap-3 max-w-[85%]`;
            loadingDiv.innerHTML = `
                <div class="h-8 w-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center">
                    <span class="material-symbols-rounded text-indigo-600 text-[16px]">smart_toy</span>
                </div>
                <div class="bg-indigo-50 px-5 py-4 rounded-2xl rounded-tl-sm flex items-center gap-1.5 shadow-sm">
                    <div class="w-2 h-2 bg-indigo-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full typing-dot"></div>
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Simulate AI Response based on context
            setTimeout(() => {
                document.getElementById(loadingId).remove();
                
                let response = "I'm analyzing that based on survival protocols. Please stand by.";
                const lowerText = text.toLowerCase();

                if (currentGuide.id === 'first-aid' && lowerText.includes('gauze')) {
                    response = "If you don't have sterile gauze, use the cleanest cloth available. A clean t-shirt, towel, or cotton fabric works. Do NOT use tissues or toilet paper as they will dissolve into the wound and cause infection. Maintain heavy pressure.";
                } else if (currentGuide.id === 'first-aid' && lowerText.includes('tourniquet')) {
                    response = "You can improvise a tourniquet using a strong cloth (like a belt or torn shirt) and a sturdy stick. Wrap the cloth, tie a knot, place the stick over it, tie another knot, and twist the stick until bleeding stops. Secure the stick in place.";
                } else if (currentGuide.id === 'evacuation' && lowerText.includes('pet')) {
                    response = "For pets: Grab their carrier, leash, a 3-day supply of food, and water. Never leave them tied up outside during an evacuation. They rely entirely on you.";
                } else {
                    response = `Based on the ${currentGuide.title} guide, standard protocol suggests proceeding with extreme caution. Keep calm and follow the core steps listed in the guide.`;
                }

                appendMessage(response, false);
            }, 1500);
        }

        // Allow Enter key to send
        aiInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendChatMessage();
        });

    </script>
</body>
</html>
