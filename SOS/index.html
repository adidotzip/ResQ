<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS Emergency</title>
    
    <!-- Tailwind CSS for M3 Expressive Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Material Symbols (Rounded) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <style>
        /* Material 3 Expressive Typography */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F0F2F5; /* Surface Container */
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none; /* Prevent pull-to-refresh */
        }

        .mono-text {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Prevent context menu on long press */
        .no-select {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* Smooth bouncy transitions for M3 expressive feel */
        .m3-card {
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s ease;
        }
        .m3-card:active {
            transform: scale(0.96);
        }

        /* Floating panel animation */
        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-float-up {
            animation: floatUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        /* Circular Progress Animation */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Pulse animation for activated state */
        @keyframes extremePulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 60px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .sos-active {
            animation: extremePulse 1.5s infinite;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex justify-center pb-8">

    <!-- Mobile App Container constraint to match Home UI -->
    <main class="w-full max-w-md bg-[#F4F5F9] min-h-screen shadow-2xl overflow-x-hidden relative flex flex-col px-6 py-8 justify-between">
        
        <!-- Header -->
        <header class="flex justify-between items-center z-10 animate-float-up">
            <a href="javascript:history.back()" class="h-12 w-12 rounded-full bg-white flex items-center justify-center border border-gray-200 shadow-[0_2px_8px_rgba(0,0,0,0.04)] m3-card text-decoration-none">
                <span class="material-symbols-rounded text-gray-700">arrow_back</span>
            </a>
            <div class="px-4 py-2 rounded-full bg-red-100 border border-red-200/60 flex items-center gap-2 shadow-sm">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-600"></span>
                </span>
                <span class="text-xs font-bold text-red-800 uppercase tracking-widest">Emergency Mode</span>
            </div>
        </header>

        <!-- Main SOS Interaction Area -->
        <section class="flex-1 flex flex-col items-center justify-center w-full mt-4">
            
            <!-- Hold to Activate Button -->
            <div class="relative w-64 h-64 sm:w-72 sm:h-72 flex items-center justify-center no-select animate-float-up" style="animation-delay: 0.1s;" id="sos-trigger-area">
                
                <!-- Background track (Light Red) -->
                <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="46" fill="transparent" stroke="#fee2e2" stroke-width="4"></circle>
                </svg>
                
                <!-- Progress ring (Vibrant Red) -->
                <svg class="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 100 100">
                    <circle id="progress-ring" class="progress-ring__circle" cx="50" cy="50" r="46" fill="transparent" stroke="#dc2626" stroke-width="6" stroke-linecap="round" stroke-dasharray="289.02" stroke-dashoffset="289.02"></circle>
                </svg>

                <!-- Actual Button -->
                <button id="sos-btn" class="w-56 h-56 sm:w-64 sm:h-64 rounded-full bg-red-600 border-4 border-red-500 flex flex-col items-center justify-center z-20 transition-all duration-300 outline-none shadow-[0_12px_40px_rgba(220,38,38,0.3)] hover:bg-red-500 m3-card">
                    <span id="sos-icon" class="material-symbols-rounded text-6xl text-white mb-2 transition-colors">emergency</span>
                    <h2 id="sos-text" class="text-4xl font-black tracking-widest text-white uppercase transition-colors">SOS</h2>
                    <p id="sos-subtext" class="text-xs text-red-100 font-bold tracking-widest uppercase mt-2">Hold 3 Seconds</p>
                </button>

            </div>

            <!-- Live Telemetry Card -->
            <div class="mt-10 bg-white border border-gray-100 rounded-[28px] p-5 w-full text-center shadow-[0_8px_24px_rgba(0,0,0,0.04)] no-select m3-card animate-float-up" style="animation-delay: 0.2s;">
                <div class="flex items-center justify-center gap-2 mb-3">
                    <div class="p-1.5 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
                        <span class="material-symbols-rounded text-[18px]">my_location</span>
                    </div>
                    <span class="text-xs text-gray-500 font-bold uppercase tracking-widest">Live Telemetry</span>
                </div>
                <div class="mono-text text-xl text-gray-800 leading-tight font-bold">
                    <p>LAT: <span id="telemetry-lat" class="text-blue-600">WAITING...</span></p>
                    <p>LON: <span id="telemetry-lon" class="text-blue-600">WAITING...</span></p>
                    <p class="text-sm text-gray-500 mt-2 font-normal">ACC: &plusmn;<span id="telemetry-acc">--</span>m</p>
                </div>
            </div>
        </section>

        <!-- Bottom Action Area -->
        <section class="w-full flex flex-col gap-4 mt-8 z-10 animate-float-up" style="animation-delay: 0.3s;">
            
            <!-- Action Row -->
            <div class="flex gap-4 w-full">
                <a href="tel:112" class="flex-1 bg-white text-gray-900 border border-gray-200 rounded-[28px] py-4 flex flex-col items-center justify-center gap-1 font-bold text-base text-decoration-none shadow-[0_4px_16px_rgba(0,0,0,0.04)] m3-card">
                    <div class="bg-red-50 text-red-500 p-2 rounded-full mb-1">
                        <span class="material-symbols-rounded text-[24px]">call</span>
                    </div>
                    Call 112
                </a>
                <a id="whatsapp-btn" href="#" target="_blank" class="flex-1 bg-[#25D366] text-white rounded-[28px] py-4 flex flex-col items-center justify-center gap-1 font-bold text-base text-decoration-none opacity-50 pointer-events-none shadow-[0_8px_24px_rgba(37,211,102,0.3)] m3-card">
                    <div class="bg-white/20 p-2 rounded-full mb-1">
                        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2400/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                    </div>
                    Notify Family
                </a>
            </div>

            <!-- AI Context Card -->
            <div class="bg-indigo-50 border border-indigo-100 rounded-[28px] p-5 w-full relative overflow-hidden shadow-[0_4px_16px_rgba(79,70,229,0.05)] m3-card">
                <div class="absolute top-0 left-0 w-1.5 h-full bg-indigo-500"></div>
                <div class="flex items-center gap-2 mb-2">
                    <span class="material-symbols-rounded text-[20px] text-indigo-600">smart_toy</span>
                    <h4 class="text-xs text-indigo-800 font-bold uppercase tracking-wider">AI Context Sync</h4>
                </div>
                <p id="ai-assessment" class="text-sm text-indigo-900/80 leading-relaxed font-medium">
                    Establishing connection and analyzing local environmental telemetry...
                </p>
            </div>

        </section>

    </main>

    <script src="../js/storage.js"></script>
    <script>
        // --- 0. Auth & Initialization ---
        if (!Storage.getUserName()) {
            window.location.href = '../onboarding.html';
        }

        // --- 1. Audio API For Real Siren ---
        let audioCtx;
        let sirenOscillator;
        let sirenInterval;

        function startAudibleSiren() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                sirenOscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                sirenOscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                sirenOscillator.type = 'square';
                gainNode.gain.value = 0.5; // Volume control
                sirenOscillator.start();

                // Alternate frequency to sound like an alarm
                let isHighPitch = false;
                sirenInterval = setInterval(() => {
                    isHighPitch = !isHighPitch;
                    sirenOscillator.frequency.setValueAtTime(isHighPitch ? 800 : 400, audioCtx.currentTime);
                }, 400);

            } catch (e) {
                console.error("Web Audio API not supported in this browser.", e);
            }
        }

        // --- 2. Circular Progress & Hold-to-Activate Logic ---
        const btn = document.getElementById('sos-btn');
        const triggerArea = document.getElementById('sos-trigger-area');
        const progressRing = document.getElementById('progress-ring');
        const circumference = 2 * Math.PI * 46; // r=46
        
        let holdTimer;
        let progressInterval;
        let progress = 0;
        let isActivated = false;
        
        const HOLD_DURATION = 3000; // 3 seconds
        const UPDATE_INTERVAL = 50; // Update UI every 50ms

        // Initialize ring
        progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
        progressRing.style.strokeDashoffset = circumference;

        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            progressRing.style.strokeDashoffset = offset;
        }

        function triggerSOS() {
            if(isActivated) return;
            isActivated = true;
            
            // UI Changes for Activated State
            btn.classList.add('sos-active');
            btn.classList.replace('bg-red-600', 'bg-red-500');
            btn.classList.replace('border-red-500', 'border-red-400');
            
            const subtext = document.getElementById('sos-subtext');
            subtext.textContent = "SIGNAL ACTIVE";
            subtext.classList.replace('text-red-100', 'text-white');
            
            // Lock progress ring to full
            setProgress(100);

            // Vibrate if supported
            if(navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 1000]);

            // Trigger the audible alarm
            startAudibleSiren();
            
            // Emphasize the WhatsApp link to prompt the user
            document.getElementById('whatsapp-btn').classList.add('animate-pulse');
        }

        function startHold(e) {
            if(isActivated) return;
            // Prevent default touch behaviors (like text selection or magnifying glass)
            if (e.cancelable) e.preventDefault(); 
            
            // Disable the bounce effect while pressing to keep the ring aligned
            btn.classList.remove('m3-card');
            btn.style.transform = "scale(0.96)";
            
            progress = 0;
            const increment = (100 / (HOLD_DURATION / UPDATE_INTERVAL));

            progressInterval = setInterval(() => {
                progress += increment;
                setProgress(progress);
                if (progress >= 100) {
                    clearInterval(progressInterval);
                    triggerSOS();
                }
            }, UPDATE_INTERVAL);
        }

        function endHold(e) {
            if(isActivated) return;
            if (e.cancelable) e.preventDefault();
            
            clearInterval(progressInterval);
            progress = 0;
            setProgress(0);
            
            // Restore bounce effect
            btn.classList.add('m3-card');
            btn.style.transform = "none";
        }

        // Attach events
        triggerArea.addEventListener('mousedown', startHold);
        triggerArea.addEventListener('touchstart', startHold, {passive: false});
        
        window.addEventListener('mouseup', endHold);
        window.addEventListener('touchend', endHold);
        triggerArea.addEventListener('mouseleave', endHold);

        // Prevent context menu
        triggerArea.addEventListener('contextmenu', e => e.preventDefault());


        // --- 3. Live Telemetry & AI Context Logic ---
        const latEl = document.getElementById('telemetry-lat');
        const lonEl = document.getElementById('telemetry-lon');
        const accEl = document.getElementById('telemetry-acc');
        const waBtn = document.getElementById('whatsapp-btn');
        const aiAssessment = document.getElementById('ai-assessment');
        
        let currentDisasterType = "Unknown Emergency";

        // Fetch local weather to inform AI context
        async function fetchEnvironmentalRisk(lat, lng) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&hourly=precipitation_probability`);
                const data = await res.json();
                const code = data.current_weather.weathercode;
                
                let riskText = "Standard environment conditions detected. Awaiting manual user distress input.";
                currentDisasterType = "General Emergency";

                if (code >= 51 && code <= 67) {
                    riskText = "Continuous rainfall detected. Potential risk of localized waterlogging or traffic disruption.";
                    currentDisasterType = "Heavy Rain / Flooding";
                } else if (code >= 95) {
                    riskText = "Severe thunderstorm activity in immediate vicinity. High risk of lightning and flash floods.";
                    currentDisasterType = "Severe Weather / Storm";
                } else if (data.current_weather.temperature > 40) {
                    riskText = "Extreme heat anomaly detected. High risk of heatstroke and dehydration.";
                    currentDisasterType = "Extreme Heatwave";
                }

                aiAssessment.innerHTML = `<span class="text-indigo-800 font-bold">Analysis Complete:</span> ${riskText}`;
                
                // Refresh link to include new AI context
                updateWhatsAppLink(lat, lng);
                
            } catch(e) {
                aiAssessment.textContent = "Unable to fetch environmental data. Relying on GPS telemetry only.";
            }
        }

        function updateWhatsAppLink(lat, lon) {
            const mapsLink = `https://maps.google.com/?q=${lat},${lon}`;
            const message = `EMERGENCY: I need help. My exact location is ${mapsLink}\n\nLat: ${lat}\nLon: ${lon}\n\nAutomated AI Context: ${currentDisasterType} detected in area.`;

            const members = Storage.getFamilyMembers();
            // Find first member that isn't the main user and has a phone number
            const contact = members.find(m => m.id !== 'user_self' && m.phone) || members[1];
            const phone = contact ? contact.phone.replace(/[^0-9]/g, '') : '';

            waBtn.href = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            
            // Enable button once location is locked
            waBtn.classList.remove('opacity-50', 'pointer-events-none');
        }

        if ("geolocation" in navigator) {
            // Use watchPosition for LIVE telemetry updates
            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude.toFixed(6);
                    const lon = position.coords.longitude.toFixed(6);
                    const acc = Math.round(position.coords.accuracy);

                    latEl.textContent = lat;
                    lonEl.textContent = lon;
                    accEl.textContent = acc;

                    // Update link dynamically as user moves
                    updateWhatsAppLink(lat, lon);
                    
                    // Fetch risk once on first lock
                    if(aiAssessment.textContent.includes("Establishing")) {
                        fetchEnvironmentalRisk(lat, lon);
                    }
                },
                (error) => {
                    latEl.textContent = "ERROR";
                    lonEl.textContent = "ERROR";
                    accEl.textContent = "N/A";
                    aiAssessment.textContent = "GPS Access Denied. Cannot generate precise location telemetry. Please enable location services.";
                },
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        } else {
            aiAssessment.textContent = "Geolocation is not supported by this device.";
        }

    </script>
</body>
</html>
