<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS Emergency</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #111827; /* Dark mode by default for high contrast */
            color: white;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none; 
            touch-action: pan-x pan-y; /* Prevent zooming */
        }

        .mono-text {
            font-family: 'JetBrains Mono', monospace;
        }

        .no-select {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* Standby Ring Animation */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Active State Pulses */
        @keyframes severePulse {
            0% { background-color: #dc2626; } /* Red-600 */
            50% { background-color: #7f1d1d; } /* Red-900 */
            100% { background-color: #dc2626; }
        }
        .bg-severe-pulse {
            animation: severePulse 1s infinite;
        }

        @keyframes alertFlash {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-alert {
            animation: alertFlash 1s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Screen Transitions */
        .screen-enter {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .screen-enter-active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Disarm Button Fill */
        .disarm-fill {
            transition: width 0.1s linear;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex justify-center overflow-hidden">

    <!-- Container -->
    <main class="w-full max-w-md min-h-screen relative flex flex-col shadow-2xl">
        
        <!-- ========================================== -->
        <!-- SCREEN 1: STANDBY MODE                     -->
        <!-- ========================================== -->
        <div id="standby-screen" class="absolute inset-0 flex flex-col px-6 py-8 justify-between bg-[#F4F5F9] text-gray-900 z-10 transition-opacity duration-300">
            
            <!-- Header -->
            <header class="flex justify-between items-center z-10">
                <a href="javascript:history.back()" class="h-12 w-12 rounded-full bg-white flex items-center justify-center border border-gray-200 shadow-sm active:scale-95 transition-transform">
                    <span class="material-symbols-rounded text-gray-700">arrow_back</span>
                </a>
                <div class="px-4 py-2 rounded-full bg-red-100 border border-red-200/60 flex items-center gap-2 shadow-sm">
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-600"></span>
                    </span>
                    <span class="text-xs font-bold text-red-800 uppercase tracking-widest">Emergency</span>
                </div>
            </header>

            <!-- Main SOS Button Area -->
            <section class="flex-1 flex flex-col items-center justify-center w-full mt-4">
                <div class="relative w-64 h-64 sm:w-72 sm:h-72 flex items-center justify-center no-select" id="sos-trigger-area">
                    
                    <!-- Background track -->
                    <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="46" fill="transparent" stroke="#fee2e2" stroke-width="4"></circle>
                    </svg>
                    
                    <!-- Progress ring -->
                    <svg class="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 100 100">
                        <circle id="progress-ring" class="progress-ring__circle" cx="50" cy="50" r="46" fill="transparent" stroke="#dc2626" stroke-width="6" stroke-linecap="round" stroke-dasharray="289.02" stroke-dashoffset="289.02"></circle>
                    </svg>

                    <!-- Actual Button -->
                    <button id="sos-btn" class="w-56 h-56 sm:w-64 sm:h-64 rounded-full bg-red-600 border-4 border-red-500 flex flex-col items-center justify-center z-20 outline-none shadow-[0_12px_40px_rgba(220,38,38,0.3)] active:scale-95 transition-transform duration-200">
                        <span class="material-symbols-rounded text-6xl text-white mb-2">emergency</span>
                        <h2 class="text-5xl font-black tracking-widest text-white uppercase">SOS</h2>
                        <p class="text-xs text-red-100 font-bold tracking-widest uppercase mt-3 bg-black/20 px-3 py-1 rounded-full">Hold 3 Seconds</p>
                    </button>
                </div>

                <!-- Live Telemetry Card -->
                <div class="mt-10 bg-white border border-gray-200 rounded-[24px] p-5 w-full text-center shadow-sm no-select">
                    <div class="flex items-center justify-center gap-2 mb-3">
                        <span class="material-symbols-rounded text-[18px] text-blue-600">my_location</span>
                        <span class="text-xs text-gray-500 font-bold uppercase tracking-widest">Live Telemetry</span>
                    </div>
                    <div class="mono-text text-xl text-gray-900 leading-tight font-bold flex flex-col gap-1">
                        <p>LAT: <span id="telemetry-lat" class="text-blue-600">ACQUIRING...</span></p>
                        <p>LON: <span id="telemetry-lon" class="text-blue-600">ACQUIRING...</span></p>
                        <p class="text-sm text-gray-500 mt-1 font-normal">ACCURACY: &plusmn;<span id="telemetry-acc">--</span>m</p>
                    </div>
                </div>
            </section>

            <!-- Bottom Action Area -->
            <section class="w-full flex flex-col gap-3 mt-6 z-10">
                <div class="flex gap-3 w-full">
                    <a href="tel:112" class="flex-1 bg-white text-gray-900 border border-gray-200 rounded-2xl py-3 flex items-center justify-center gap-2 font-bold text-base shadow-sm active:bg-gray-50">
                        <span class="material-symbols-rounded text-red-600">call</span> Call 112
                    </a>
                    <a id="whatsapp-btn" href="#" target="_blank" class="flex-1 bg-[#25D366] text-white rounded-2xl py-3 flex items-center justify-center gap-2 font-bold text-base shadow-sm opacity-50 pointer-events-none active:bg-[#20bd5a]">
                        <span class="material-symbols-rounded text-white">chat</span> Msg Family
                    </a>
                </div>
                <!-- AI Context snippet -->
                <div class="text-center">
                    <p id="ai-assessment" class="text-[11px] text-gray-500 font-medium px-4">Gathering environmental risk data...</p>
                </div>
            </section>
        </div>


        <!-- ========================================== -->
        <!-- SCREEN 2: ACTIVE DISTRESS MODE             -->
        <!-- ========================================== -->
        <div id="active-screen" class="absolute inset-0 bg-severe-pulse flex flex-col px-6 py-10 justify-between z-50 pointer-events-none opacity-0 transition-opacity duration-300">
            
            <div class="text-center mt-8 animate-alert">
                <span class="material-symbols-rounded text-7xl text-white mb-2">warning</span>
                <h1 class="text-4xl font-black tracking-widest uppercase text-white leading-none">DISTRESS<br>SIGNAL<br>ACTIVE</h1>
            </div>

            <div class="bg-black/40 backdrop-blur-md rounded-[24px] p-6 border border-white/20 text-center">
                <h3 id="dispatch-status" class="text-red-300 font-bold uppercase tracking-widest text-sm mb-4">Notifying Contacts In</h3>
                <div id="countdown-display" class="text-7xl font-black mono-text text-white mb-4">
                    10
                </div>
                <div class="w-full bg-black/50 rounded-full h-2 mb-6 overflow-hidden">
                    <div id="countdown-bar" class="bg-red-500 h-full w-full transition-all duration-1000 ease-linear"></div>
                </div>
                
                <div class="mono-text text-sm text-gray-300 border-t border-white/10 pt-4 text-left">
                    <p>BROADCASTING COORDS:</p>
                    <p class="text-white font-bold text-lg mt-1"><span id="active-lat">--</span>, <span id="active-lon">--</span></p>
                </div>
            </div>

            <!-- Disarm Area -->
            <div class="w-full">
                <p class="text-center text-red-200 text-xs font-bold uppercase tracking-widest mb-3">Hold to Cancel Dispatch</p>
                <div id="disarm-trigger" class="relative w-full h-16 bg-black/50 border border-white/20 rounded-full overflow-hidden flex items-center justify-center no-select pointer-events-auto cursor-pointer">
                    <div id="disarm-fill" class="absolute left-0 top-0 bottom-0 bg-white w-0 disarm-fill"></div>
                    <span class="relative z-10 font-bold text-white uppercase tracking-widest text-sm mix-blend-difference">Cancel SOS</span>
                </div>
            </div>
            
        </div>

    </main>

    <script>
        // --- 0. Fallback Storage Mock (Ensures page runs independently) ---
        const StorageMock = {
            getFamilyMembers: () => [
                { id: 'user_self', name: 'Me' },
                { id: '1', name: 'Emergency Contact', phone: '112' }
            ]
        };
        const appStorage = (typeof Storage !== 'undefined' && Storage.getFamilyMembers) ? Storage : StorageMock;

        // --- 1. DOM Elements ---
        const standbyScreen = document.getElementById('standby-screen');
        const activeScreen = document.getElementById('active-screen');
        
        // Trigger UI
        const triggerArea = document.getElementById('sos-trigger-area');
        const btn = document.getElementById('sos-btn');
        const progressRing = document.getElementById('progress-ring');
        
        // Disarm UI
        const disarmTrigger = document.getElementById('disarm-trigger');
        const disarmFill = document.getElementById('disarm-fill');
        
        // Telemetry UI
        const latEl = document.getElementById('telemetry-lat');
        const lonEl = document.getElementById('telemetry-lon');
        const accEl = document.getElementById('telemetry-acc');
        const actLatEl = document.getElementById('active-lat');
        const actLonEl = document.getElementById('active-lon');
        
        // Countdown UI
        const countdownDisplay = document.getElementById('countdown-display');
        const countdownBar = document.getElementById('countdown-bar');
        const dispatchStatus = document.getElementById('dispatch-status');
        
        // Links
        const waBtn = document.getElementById('whatsapp-btn');
        const aiAssessment = document.getElementById('ai-assessment');

        // --- 2. State Variables ---
        const circumference = 2 * Math.PI * 46; 
        progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
        progressRing.style.strokeDashoffset = circumference;

        let isActivated = false;
        let holdTimer;
        let progressInterval;
        let progress = 0;
        const HOLD_DURATION = 3000; // 3 seconds to trigger
        const DISARM_DURATION = 2000; // 2 seconds to disarm
        const UPDATE_INTERVAL = 50;

        let countdownValue = 10;
        let countdownInterval;
        let isDispatched = false;

        let currentLat = "0.000000";
        let currentLon = "0.000000";
        let currentDisasterType = "General Emergency";

        // --- 3. Audio Siren API ---
        let audioCtx;
        let sirenOscillator;
        let sirenInterval;

        function startAudibleSiren() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                sirenOscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                sirenOscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                sirenOscillator.type = 'square';
                gainNode.gain.value = 0.8; // LOUD
                sirenOscillator.start();

                let isHighPitch = false;
                sirenInterval = setInterval(() => {
                    isHighPitch = !isHighPitch;
                    // High-low European style siren (hi-lo)
                    sirenOscillator.frequency.setValueAtTime(isHighPitch ? 900 : 700, audioCtx.currentTime);
                    if(navigator.vibrate) navigator.vibrate(400); // Pulse vibration with siren
                }, 500);
            } catch (e) {
                console.warn("Audio API blocked or unsupported.");
            }
        }

        function stopAudibleSiren() {
            if (sirenOscillator) {
                sirenOscillator.stop();
                sirenOscillator.disconnect();
            }
            if (sirenInterval) clearInterval(sirenInterval);
        }

        // --- 4. Main Activation Logic ---
        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            progressRing.style.strokeDashoffset = offset;
        }

        function activateEmergencyMode() {
            if(isActivated) return;
            isActivated = true;
            
            // UI Switch
            standbyScreen.classList.add('opacity-0', 'pointer-events-none');
            activeScreen.classList.remove('opacity-0', 'pointer-events-none');
            activeScreen.classList.add('pointer-events-auto');

            // Copy telemetry to active screen
            actLatEl.textContent = currentLat;
            actLonEl.textContent = currentLon;

            startAudibleSiren();
            startDispatchCountdown();
        }

        function startDispatchCountdown() {
            countdownValue = 10;
            isDispatched = false;
            countdownDisplay.textContent = countdownValue;
            countdownBar.style.width = '100%';

            countdownInterval = setInterval(() => {
                countdownValue--;
                countdownDisplay.textContent = countdownValue;
                countdownBar.style.width = `${(countdownValue / 10) * 100}%`;

                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    executeDispatch();
                }
            }, 1000);
        }

        function executeDispatch() {
            isDispatched = true;
            dispatchStatus.textContent = "CONTACTS & AUTHORITIES NOTIFIED";
            dispatchStatus.classList.replace('text-red-300', 'text-white');
            countdownDisplay.innerHTML = '<span class="material-symbols-rounded text-6xl text-green-400">check_circle</span>';
            countdownBar.parentElement.style.display = 'none';
            
            // In a real app, this sends the SMS/API calls to backend
            console.log("CRITICAL: DISPATCH EXECUTED", {lat: currentLat, lon: currentLon});
            if(navigator.vibrate) navigator.vibrate([1000, 500, 1000]); // Long sustained vibe
        }

        function disarmEmergency() {
            isActivated = false;
            clearInterval(countdownInterval);
            stopAudibleSiren();
            
            // Reset state
            dispatchStatus.textContent = "Notifying Contacts In";
            dispatchStatus.classList.replace('text-white', 'text-red-300');
            countdownBar.parentElement.style.display = 'block';
            setProgress(0);
            
            // UI Switch back
            activeScreen.classList.add('opacity-0', 'pointer-events-none');
            activeScreen.classList.remove('pointer-events-auto');
            standbyScreen.classList.remove('opacity-0', 'pointer-events-none');
        }

        // --- 5. Trigger Interactions (Hold to SOS) ---
        function startHold(e) {
            if(isActivated) return;
            if (e.cancelable) e.preventDefault(); 
            
            btn.style.transform = "scale(0.92)";
            progress = 0;
            const increment = (100 / (HOLD_DURATION / UPDATE_INTERVAL));

            progressInterval = setInterval(() => {
                progress += increment;
                setProgress(progress);
                if (progress >= 100) {
                    clearInterval(progressInterval);
                    btn.style.transform = "none";
                    activateEmergencyMode();
                }
            }, UPDATE_INTERVAL);
        }

        function endHold(e) {
            if(isActivated) return;
            if (e.cancelable) e.preventDefault();
            
            clearInterval(progressInterval);
            progress = 0;
            setProgress(0);
            btn.style.transform = "none";
        }

        triggerArea.addEventListener('mousedown', startHold);
        triggerArea.addEventListener('touchstart', startHold, {passive: false});
        window.addEventListener('mouseup', endHold);
        window.addEventListener('touchend', endHold);
        triggerArea.addEventListener('mouseleave', endHold);
        triggerArea.addEventListener('contextmenu', e => e.preventDefault());

        // --- 6. Disarm Interactions (Hold to Cancel) ---
        let disarmProgress = 0;
        let disarmInterval;

        function startDisarmHold(e) {
            if(!isActivated || isDispatched) return; // Cannot cancel if already dispatched
            if (e.cancelable) e.preventDefault();

            disarmProgress = 0;
            const increment = (100 / (DISARM_DURATION / UPDATE_INTERVAL));

            disarmInterval = setInterval(() => {
                disarmProgress += increment;
                disarmFill.style.width = `${disarmProgress}%`;
                
                if (disarmProgress >= 100) {
                    clearInterval(disarmInterval);
                    disarmFill.style.width = `0%`;
                    disarmEmergency();
                }
            }, UPDATE_INTERVAL);
        }

        function endDisarmHold(e) {
            if(!isActivated || isDispatched) return;
            clearInterval(disarmInterval);
            disarmProgress = 0;
            disarmFill.style.width = `0%`;
        }

        disarmTrigger.addEventListener('mousedown', startDisarmHold);
        disarmTrigger.addEventListener('touchstart', startDisarmHold, {passive: false});
        window.addEventListener('mouseup', endDisarmHold);
        window.addEventListener('touchend', endDisarmHold);
        disarmTrigger.addEventListener('mouseleave', endDisarmHold);
        disarmTrigger.addEventListener('contextmenu', e => e.preventDefault());


        // --- 7. Live Telemetry & Context ---
        function updateWhatsAppLink() {
            const mapsLink = `https://maps.google.com/?q=${currentLat},${currentLon}`;
            const message = `🚨 EMERGENCY SOS 🚨\nI need immediate assistance. My exact live location is:\n${mapsLink}\n\nCoordinates: ${currentLat}, ${currentLon}\nAI Context: ${currentDisasterType}`;

            const members = appStorage.getFamilyMembers();
            const contact = members.find(m => m.id !== 'user_self' && m.phone) || members[1];
            const phone = contact && contact.phone ? contact.phone.replace(/[^0-9]/g, '') : '';

            waBtn.href = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            waBtn.classList.remove('opacity-50', 'pointer-events-none');
        }

        async function fetchEnvironmentalRisk(lat, lng) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
                const data = await res.json();
                const code = data.current_weather.weathercode;
                
                let riskText = "Standard environment conditions.";
                currentDisasterType = "General Emergency";

                if (code >= 51 && code <= 67) {
                    riskText = "Heavy rainfall detected in area.";
                    currentDisasterType = "Heavy Rain / Flooding Risk";
                } else if (code >= 95) {
                    riskText = "Severe thunderstorm activity in immediate vicinity.";
                    currentDisasterType = "Severe Weather";
                }

                aiAssessment.innerHTML = `AI Context: ${riskText}`;
                updateWhatsAppLink();
            } catch(e) {
                aiAssessment.textContent = "AI Context unavailable. Using GPS only.";
            }
        }

        // Initialize Geolocation
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    currentLat = position.coords.latitude.toFixed(6);
                    currentLon = position.coords.longitude.toFixed(6);
                    const acc = Math.round(position.coords.accuracy);

                    latEl.textContent = currentLat;
                    lonEl.textContent = currentLon;
                    accEl.textContent = acc;
                    
                    if(isActivated) {
                        actLatEl.textContent = currentLat;
                        actLonEl.textContent = currentLon;
                    }

                    updateWhatsAppLink();
                    
                    // Fetch weather context once
                    if(aiAssessment.textContent.includes("Gathering")) {
                        fetchEnvironmentalRisk(currentLat, currentLon);
                    }
                },
                (error) => {
                    latEl.textContent = "ERROR";
                    lonEl.textContent = "ERROR";
                    accEl.textContent = "N/A";
                    aiAssessment.textContent = "GPS Access Denied. Precise location unavailable.";
                },
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        } else {
            aiAssessment.textContent = "Geolocation is not supported by this device.";
        }

    </script>
</body>
</html>
