<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome - Command Center</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F0F2F5;
            -webkit-tap-highlight-color: transparent;
        }

        .m3-card {
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s ease;
        }
        .m3-card:active {
            transform: scale(0.96);
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-float-up {
            animation: floatUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex justify-center pb-8">

    <main class="w-full max-w-md bg-[#F4F5F9] min-h-screen shadow-2xl overflow-x-hidden relative flex flex-col justify-center px-6">

        <div class="animate-float-up flex flex-col gap-6 items-center text-center">
            <div class="h-24 w-24 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 mb-2">
                <span class="material-symbols-rounded text-[48px]">health_and_safety</span>
            </div>

            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight leading-tight mb-2">Let's Get to Know You</h1>
                <p class="text-gray-500 font-medium text-sm px-4">Set up your profile to start using the Emergency Command Center.</p>
            </div>

            <div class="w-full bg-white rounded-[28px] p-6 shadow-[0_4px_16px_rgba(0,0,0,0.04)] border border-gray-100 text-left mt-4">
                <label class="block text-sm font-medium text-gray-700 mb-2 ml-1">What should we call you?</label>
                <input type="text" id="name-input" class="w-full bg-gray-50 border border-gray-200 rounded-2xl py-3 px-4 text-lg focus:outline-none focus:border-blue-500 transition-all placeholder-gray-400" placeholder="Enter your name">
                <p id="error-msg" class="text-red-500 text-xs mt-2 ml-1 hidden">Please enter your name.</p>
            </div>

            <button onclick="handleGetStarted()" class="w-full bg-blue-600 text-white rounded-full py-4 font-bold shadow-lg hover:bg-blue-700 transition-all m3-card mt-2 text-lg">
                Get Started
            </button>
        </div>

    </main>

    <script src="js/storage.js"></script>
    <script>
        function handleGetStarted() {
            const nameInput = document.getElementById('name-input').value.trim();
            const errorMsg = document.getElementById('error-msg');

            if (!nameInput) {
                errorMsg.classList.remove('hidden');
                return;
            }

            Storage.setUserName(nameInput);

            // Initialize default family members
            const defaultFamily = [
                {
                    id: 'user_self',
                    name: `${nameInput} (You)`,
                    relation: "Self",
                    lat: 28.6139,
                    lng: 77.2090,
                    avatar: "https://i.pravatar.cc/150?u=user_self",
                    status: "safe",
                    lastSeen: "Just now",
                    battery: "84%",
                    phone: ''
                },
                {
                    id: 'david',
                    name: "David",
                    relation: "Husband",
                    lat: 28.6250,
                    lng: 77.2150,
                    avatar: "https://i.pravatar.cc/150?u=david",
                    status: "safe",
                    lastSeen: "2 mins ago",
                    battery: "62%",
                    phone: '+1234567890'
                },
                {
                    id: 'emma',
                    name: "Emma",
                    relation: "Daughter",
                    lat: 28.5900,
                    lng: 77.1900,
                    avatar: "https://i.pravatar.cc/150?u=emma",
                    status: "danger",
                    lastSeen: "Offline (45m)",
                    battery: "12%",
                    phone: '+1098765432'
                }
            ];
            Storage.setFamilyMembers(defaultFamily);

            window.location.href = 'index.html' + window.location.search;
        }
    </script>
</body>
</html>
